# @package training
optim:
  lr: 3.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]
  eps: 1.0e-8
sched:
  epochs: 60
  warmup_frac: 0.05
  min_lr: 1.0e-6
epochs: 60
grad_clip_norm: 1.0
grad_accum_steps: 1
amp_dtype: bf16
ema_decay: 0.9999
early_stopping_patience: 10
log_every: 50
sanity_steps: 0
eval_during_training: true
