# @package data
name: celebdfpp
paths:
  raw_root: ${oc.env:WISER_RAW,${hydra:runtime.cwd}/dataset}
  cache_root: ${oc.env:WISER_CACHE,${hydra:runtime.cwd}/preprocessed}
img_size: 256
wavelet_size: 128
frames_per_video: 100
frame_stride: 10
crop_margin: 0.30
batch_size: 96
eval_batch_size: 128
num_workers: 8
prefetch_factor: 2
pin_memory: true
persistent_workers: true
# Celeb-DF++ is test-only — these splits never apply.
val_fraction: 0.0
test_fraction: 1.0
split_seed: 42
