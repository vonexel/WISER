# @package augment
use_awb_sbi: false
sbi:
  enabled: false
  p_sbi: 0.0
  feather_sigma_min: 1.0
  feather_sigma_max: 5.0
  alpha_ll: 0.15
  energy_boost: 1.5
  soft_label: 0.7
awb_v2:
  enabled: true
  name: awb_sbi_v2
  p_apply: 0.5
  use_sbi_mask: true
  operate_on_wavelet: true
  bands:
    perturb_ll: false
    high_bands: [LH, HL, HH]
    band_temperature: 0.7
  strength:
    min_strength: 0.05
    max_strength: 0.35
    strength_step: 0.02
    init_strength: 0.20
  hardness:
    enabled: true
    ema_decay: 0.95
    hard_fake_threshold: 0.45
    false_real_threshold: 0.65
  soft_labels:
    enabled: true
    min_label: 0.55
    max_label: 0.95
  real_preservation_guard:
    enabled: true
    cooldown_steps: 100
    strength_multiplier: 0.75
  logging:
    log_band_probs: true
    log_strength: true
    log_soft_label_mean: true
freqmask:
  enabled: true
  p_freqmask: 0.3
  min_size_frac: 0.05
  max_size_frac: 0.25
  high_freq_bias: 0.7
arca:
  enabled: true
  p_apply_real: 0.5
  jpeg_qf_min: 30
  jpeg_qf_max: 60
  noise_sigma_max: 0.0314
  median_blur_kernel: 3
  gamma_min: 0.7
  gamma_max: 1.3
  p_jpeg: 0.7
  p_noise: 0.5
  p_blur: 0.3
  p_gamma: 0.5
real_mixstyle:
  enabled: true
  p_mix: 0.3
horizontal_flip: 0.5
color_jitter: 0.5
jpeg_compression: 0.3
gauss_noise: 0.2
gauss_blur: 0.2
brightness_contrast: 0.3
shift_scale_rotate: 0.5
